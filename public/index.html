<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ニュースDB チャット</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
      background: #f0f2f5;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a73e8;
      color: white;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    header h1 { font-size: 18px; font-weight: 600; }

    #stats {
      font-size: 12px;
      opacity: 0.85;
      background: rgba(255,255,255,0.15);
      padding: 4px 10px;
      border-radius: 20px;
    }

    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      max-width: 78%;
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.7;
      font-size: 14px;
      word-break: break-word;
    }

    .message.user {
      align-self: flex-end;
      background: #1a73e8;
      color: white;
      border-bottom-right-radius: 4px;
    }

    .message.assistant {
      align-self: flex-start;
      background: white;
      color: #1a1a1a;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .message.assistant .meta {
      font-size: 11px;
      color: #999;
      margin-top: 8px;
      border-top: 1px solid #eee;
      padding-top: 6px;
    }

    .message.loading {
      align-self: flex-start;
      background: white;
      color: #999;
      font-style: italic;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    /* Markdown スタイル */
    .message.assistant p { margin-bottom: 8px; }
    .message.assistant p:last-child { margin-bottom: 0; }
    .message.assistant strong { color: #1a73e8; }
    .message.assistant a { color: #1a73e8; text-decoration: none; }
    .message.assistant a:hover { text-decoration: underline; }
    .message.assistant ul, .message.assistant ol { padding-left: 20px; margin: 6px 0; }
    .message.assistant li { margin-bottom: 4px; }
    .message.assistant h1,.message.assistant h2,.message.assistant h3 {
      font-size: 14px; font-weight: 600; margin: 10px 0 4px;
    }

    .welcome {
      align-self: center;
      text-align: center;
      color: #888;
      font-size: 13px;
      background: white;
      padding: 20px 28px;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      max-width: 500px;
    }
    .welcome h2 { font-size: 15px; color: #444; margin-bottom: 8px; }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 14px;
    }

    .suggestion-btn {
      background: #f0f6ff;
      border: 1px solid #c5d8fa;
      color: #1a73e8;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .suggestion-btn:hover { background: #d8eafd; }

    #input-area {
      background: white;
      padding: 16px 24px;
      border-top: 1px solid #e0e0e0;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #user-input {
      flex: 1;
      border: 1px solid #ddd;
      border-radius: 24px;
      padding: 10px 18px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      max-height: 120px;
      line-height: 1.5;
      transition: border-color 0.2s;
    }
    #user-input:focus { border-color: #1a73e8; }

    #send-btn {
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 50%;
      width: 42px;
      height: 42px;
      font-size: 18px;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #send-btn:hover { background: #1557b0; }
    #send-btn:disabled { background: #ccc; cursor: not-allowed; }
  </style>
</head>
<body>

<header>
  <h1>ニュースDB チャット</h1>
  <span id="stats">読込中...</span>
</header>

<div id="chat-container">
  <div class="welcome">
    <h2>アメリカ経済ニュースについて質問してください</h2>
    <p>毎日収集したニュース記事データベースをもとに回答します。</p>
    <div class="suggestions">
      <button class="suggestion-btn" onclick="sendSuggestion(this)">最近のFRBの動向は？</button>
      <button class="suggestion-btn" onclick="sendSuggestion(this)">米国の雇用状況は？</button>
      <button class="suggestion-btn" onclick="sendSuggestion(this)">関税・貿易政策の最新情報は？</button>
      <button class="suggestion-btn" onclick="sendSuggestion(this)">株式市場の動きは？</button>
    </div>
  </div>
</div>

<div id="input-area">
  <textarea id="user-input" placeholder="質問を入力してください..." rows="1"></textarea>
  <button id="send-btn" onclick="sendMessage()">&#9658;</button>
</div>

<script>
  const chatContainer = document.getElementById('chat-container');
  const userInput = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');
  let history = [];

  // テキストエリアの高さを自動調整
  userInput.addEventListener('input', () => {
    userInput.style.height = 'auto';
    userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
  });

  // Enter送信（Shift+Enterで改行）
  userInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  function addMessage(role, content, meta = '') {
    const div = document.createElement('div');
    div.className = `message ${role}`;
    if (role === 'assistant') {
      div.innerHTML = marked.parse(content);
      if (meta) {
        const metaDiv = document.createElement('div');
        metaDiv.className = 'meta';
        metaDiv.textContent = meta;
        div.appendChild(metaDiv);
      }
    } else if (role === 'loading') {
      div.textContent = content;
    } else {
      div.textContent = content;
    }
    chatContainer.appendChild(div);
    chatContainer.scrollTop = chatContainer.scrollHeight;
    return div;
  }

  function sendSuggestion(btn) {
    userInput.value = btn.textContent;
    sendMessage();
  }

  async function sendMessage() {
    const message = userInput.value.trim();
    if (!message || sendBtn.disabled) return;

    addMessage('user', message);
    userInput.value = '';
    userInput.style.height = 'auto';
    sendBtn.disabled = true;

    const loading = addMessage('loading', '回答を生成中...');

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message, history }),
      });

      const data = await res.json();
      loading.remove();

      if (data.error) {
        addMessage('assistant', `エラー: ${data.error}`);
      } else {
        const meta = `参照記事: ${data.articlesFound} 件`;
        addMessage('assistant', data.reply, meta);
        history.push({ role: 'user', content: message });
        history.push({ role: 'assistant', content: data.reply });
      }
    } catch (err) {
      loading.remove();
      addMessage('assistant', 'ネットワークエラーが発生しました。');
    }

    sendBtn.disabled = false;
    userInput.focus();
  }

  // DB統計を取得して表示
  async function loadStats() {
    try {
      const res = await fetch('/api/stats');
      const data = await res.json();
      document.getElementById('stats').textContent = `DB: ${data.totalArticles} 件の記事`;
    } catch (_) {
      document.getElementById('stats').textContent = 'DB接続エラー';
    }
  }

  loadStats();
</script>
</body>
</html>
